name: Deploy to GitHub Pages

on:
  push:
    branches: [main, 'feature/*']

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      # VOICEVOX Nemo 엔진을 백그라운드로 띄우고 누락된 단어만 합성한다.
      # 해시 기반 파일명이라 이미 존재하는 wav는 스킵된다(멱등).
      - name: Start VOICEVOX Nemo engine
        run: |
          docker run --rm -d --name voicevox-nemo -p 50121:50121 \
            voicevox/voicevox_nemo_engine:cpu-ubuntu20.04-latest
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:50121/version > /dev/null; then
              echo "Nemo engine ready"
              break
            fi
            sleep 2
          done

      - name: Generate missing TTS audio
        run: node scripts/generate-tts.mjs

      - name: Stop Nemo engine
        if: always()
        run: docker stop voicevox-nemo || true

      # 신규 생성된 wav + index.json을 main 브랜치에 자동 커밋
      - name: Commit new audio files
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/audio
          if git diff --cached --quiet; then
            echo "No audio changes to commit"
          else
            git commit -m "chore: VOICEVOX Nemo 음성 자동 생성"
            git push
          fi

      - run: npm run build

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v5
