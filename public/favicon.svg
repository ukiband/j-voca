<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Torii gate silhouette -->
  <g fill="none" stroke="#e11d48" stroke-width="14" stroke-linecap="round">
    <!-- Top beam -->
    <path d="M120 160 L392 160" stroke-width="18"/>
    <!-- Curved top -->
    <path d="M100 148 Q256 100 412 148" stroke-width="16"/>
    <!-- Second beam -->
    <path d="M148 195 L364 195"/>
    <!-- Left pillar -->
    <line x1="170" y1="160" x2="160" y2="310"/>
    <!-- Right pillar -->
    <line x1="342" y1="160" x2="352" y2="310"/>
  </g>
  <!-- 語 character -->
  <text x="256" y="420" font-size="170" text-anchor="middle" fill="white" font-family="serif" font-weight="700">語</text>
</svg>
